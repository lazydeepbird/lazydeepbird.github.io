name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 노드 버전은 최신으로 유지
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Astro
        run: npm run build

      - name: Upload artifact
        # v5는 없고 v3가 최신이야! 이걸로 수정
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # 얘도 v3가 최신 안정화 버전이야
        uses: actions/deploy-pages@v4